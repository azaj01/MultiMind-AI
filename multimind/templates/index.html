<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MultiMind</title>
    <link rel="icon" href="/static/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="shell" id="appShell">
      <aside class="panel settings-panel">
        <div class="settings-header">
          <div class="title-container">
            <div class="eyebrow">Local reasoning pipeline</div>
            <h1>MultiMind</h1>
          </div>
          <button
            id="toggleSidebar"
            class="ghost-button icon-button"
            type="button"
            aria-label="Toggle settings"
            title="Toggle settings"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </div>

        <div class="settings-content">
          <div
            class="mode-toggle"
            id="mainTabs"
            style="margin-bottom: 1rem; display: flex"
          >
            <button
              class="mode-button tab-button active"
              data-tab="standard"
              type="button"
              style="flex: 1"
            >
              Thinking
            </button>
            <button
              class="mode-button tab-button"
              data-tab="council"
              type="button"
              style="flex: 1"
            >
              Council
            </button>
            <button
              class="mode-button tab-button"
              data-tab="org"
              type="button"
              style="flex: 1"
            >
              Organisation
            </button>
          </div>
          <p class="lede">
            Small local models get a stricter process: plan, execute, then
            critique.
          </p>

          <div class="settings-group">
            <div class="section-title-row">
              <h2>Provider</h2>
              <button id="refreshProviders" class="ghost-button" type="button">
                Refresh
              </button>
            </div>
            <label>
              <span>Detected backend</span>
              <select id="providerSelect"></select>
            </label>
            <label>
              <span>Kind</span>
              <select id="providerKind">
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI-compatible</option>
              </select>
            </label>
            <label>
              <span>Base URL</span>
              <input
                id="baseUrl"
                type="text"
                placeholder="http://127.0.0.1:11434"
              />
            </label>
            <div id="ollamaThinkLabel" class="toggle-row">
              <span>Ollama thinking</span>
              <label class="switch">
                <input id="ollamaThink" type="checkbox" />
                <span class="slider round"></span>
              </label>
            </div>
          </div>

          <div class="settings-group" id="standardSettings">
            <h2>Per-step models</h2>
            <label>
              <span>Planning</span>
              <input
                id="modelPlan"
                type="text"
                list="modelSuggestions"
                placeholder="llama3.2:3b"
              />
            </label>
            <label>
              <span>Execution</span>
              <input
                id="modelExecute"
                type="text"
                list="modelSuggestions"
                placeholder="llama3.2:3b"
              />
            </label>
            <label>
              <span>Critique</span>
              <input
                id="modelCritique"
                type="text"
                list="modelSuggestions"
                placeholder="llama3.2:3b"
              />
            </label>
          </div>

          <div
            class="settings-group"
            id="councilSettings"
            style="display: none"
          >
            <h2>Agent Council</h2>
            <div id="councilMembersContainer">
              <label>
                <span>Council Members</span>
              </label>
            </div>
            <button
              id="addCouncilMember"
              class="ghost-button"
              type="button"
              style="margin-bottom: 1rem; width: 100%"
            >
              + Add Advisor
            </button>
            <label>
              <span>Judge Model</span>
              <input
                id="judgeModel"
                type="text"
                list="modelSuggestions"
                placeholder="llama3.2:3b"
              />
            </label>
          </div>

          <div
            class="settings-group"
            id="orgSettings"
            style="display: none"
          >
            <h2>Organisation</h2>
            <label>
              <span>Model (all agents)</span>
              <input
                id="orgModel"
                type="text"
                list="modelSuggestions"
                placeholder="llama3.2:3b"
              />
            </label>
          </div>

          <datalist id="modelSuggestions"></datalist>

          <button id="saveSettings" class="primary-button" type="button">
            Save settings
          </button>
          <div id="statusBar" class="status-bar">
            Waiting for local providers.
          </div>
        </div>
      </aside>

      <main class="panel workspace-panel">
        <section class="hero">
          <div>
            <h2 id="heroTitle">Make your local models reason</h2>
          </div>
          <div
            class="mode-toggle"
            id="modeToggle"
            role="tablist"
            aria-label="Reasoning mode"
          >
            <button class="mode-button active" data-mode="off" type="button">
              Off
            </button>
            <button class="mode-button" data-mode="medium" type="button">
              Medium
            </button>
            <button class="mode-button" data-mode="hard" type="button">
              Hard
            </button>
          </div>
        </section>

        <section id="chatLog" class="chat-log"></section>

        <form id="composer" class="composer">
          <label class="composer-label" for="promptInput">Prompt</label>
          <textarea
            id="promptInput"
            rows="4"
            placeholder="Ask for a plan, a code fix, a summary, or a logic puzzle."
          ></textarea>
          <div class="composer-actions">
            <button id="sendButton" class="primary-button" type="submit">
              Run pipeline
            </button>
          </div>
        </form>
      </main>
    </div>

    <template id="assistantMessageTemplate">
      <article class="message assistant-message">
        <div class="message-header">
          <span>Assistant</span>
          <span class="message-meta">Streaming</span>
        </div>
        <div class="timeline" data-role="timeline"></div>
        <div class="final-answer" data-role="finalAnswer"></div>
      </article>
    </template>

    <template id="userMessageTemplate">
      <article class="message user-message">
        <div class="message-header">
          <span>You</span>
        </div>
        <div class="message-body" data-role="userBody"></div>
      </article>
    </template>

    <template id="stepTemplate">
      <section class="timeline-step" data-role="stepCard">
        <div class="step-marker"></div>
        <div class="step-card-body">
          <button class="step-header" type="button" data-role="stepToggle">
            <div>
              <div class="step-label" data-role="stepLabel"></div>
              <div class="step-model" data-role="stepModel"></div>
            </div>
            <span class="step-state" data-role="stepState">Running</span>
          </button>
          <div class="step-content collapsed" data-role="stepContent"></div>
        </div>
      </section>
    </template>

    <template id="orgChartMessageTemplate">
      <article class="message assistant-message">
        <div class="message-header">
          <span>Organisation</span>
          <span class="message-meta">Streaming</span>
        </div>
        <div class="org-chart" data-role="orgChart"></div>
        <div class="final-answer" data-role="finalAnswer"></div>
      </article>
    </template>

    <template id="orgNodeTemplate">
      <div class="org-node" data-role="orgNode">
        <button class="org-node-header" type="button" data-role="orgNodeToggle">
          <div>
            <div class="org-node-role" data-role="orgNodeRole"></div>
            <div class="org-node-slug" data-role="orgNodeSlug"></div>
          </div>
          <div class="org-node-meta">
            <span class="org-node-badge" data-role="orgNodeBadge">0 reports</span>
            <span class="org-node-status" data-role="orgNodeStatus">Running</span>
          </div>
        </button>
        <div class="org-node-output collapsed" data-role="orgNodeOutput"></div>
        <div class="org-node-children" data-role="orgNodeChildren"></div>
      </div>
    </template>

    <script defer src="/static/vendor/katex/katex.min.js"></script>
    <script
      defer
      src="/static/vendor/katex/contrib/auto-render.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
